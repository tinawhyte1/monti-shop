<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Background Image */
.background {
  position: fixed;
  inset: 0;
  background: url("images/Look sharp on the go with this modern grey….jpg") center/cover no-repeat;
  filter: blur(3px);
  background-position: bottom;
  z-index: -1;
}


.modal {
  width: 380px;
  padding: 40px 35px;
  border-radius: 25px;

  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);

  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);

  color: #fff;
  position: relative;
}

/* Close button */
.close-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: #f4b400;
  color: #fff;
  width: 30px;
  height: 30px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
}

/* Title */
.modal h2 {
  text-align: center;
  margin-bottom: 30px;
  font-weight: 600;
}


.input-group {
  position: relative;
  margin-bottom: 25px;
}

.input-group input {
  width: 100%;
  padding: 10px 35px 10px 5px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.7);
  color: #fff;
  font-size: 14px;
  outline: none;
}

.input-group input::placeholder {
  color: rgba(255,255,255,0.8);
}

.input-group i {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  opacity: 0.8;
}


.remember {
  display: flex;
  align-items: center;
  font-size: 13px;
  margin-bottom: 25px;
}

.remember input {
  margin-right: 8px;
}

/* Register Button */
.register-btn {
  width: 100%;
  padding: 12px;
  border-radius: 30px;
  border: none;
  font-weight: 500;
  font-size: 15px;
  cursor: pointer;

  background: linear-gradient(90deg, #f9a825, #f57c00);
  color: #fff;
  transition: 0.3s ease;
}

.register-btn:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}

/* Bottom Text */
.login-text {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
}

.login-text span {
  font-weight: 600;
  cursor: pointer;
}
  </style>
</head>
<body>

  <!-- Background -->
  <div class="background"></div>

  <!-- Modal -->
  <div class="modal">
    <div class="close-btn">✕</div>

    <h2>Sign In</h2>

    <form>
      <div class="input-group">
        <input type="text" placeholder="Name" required>
        <i class="fa-regular fa-user"></i>
      </div>

      <div class="input-group">
        <input type="email" placeholder="Email" required>
        <i class="fa-regular fa-envelope"></i>
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password" required>
        <i class="fa-regular fa-eye-slash"></i>
      </div>

      <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
      </div>

      <button type="submit" class="register-btn">Register</button>

      <p class="login-text">
        Already have an Account? <span>Login</span>
      </p>
    </form>
  </div>

</body>
</html>
