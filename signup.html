<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(120deg, #0f3d3e, #000000);
  display: flex;
  align-items: center;
  justify-content: center;
}
main{
    margin-top: 200px;
}
.container {
  width: 100%;
  max-width: 950px;
  padding: 20px;
  
}

.card {
  display: flex;
  width: 100%;
  height: 550px;
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

/* LEFT SIDE */
.left {
  flex: 1;
  background: url('images/2025 Best outfits for cold season by….jpg') center/cover no-repeat;
  position: relative;
}

.left::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

.overlay {
  position: relative;
  z-index: 2;
  height: 100%;
  padding: 60px;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.overlay h1 {
  font-size: 36px;
  font-weight: 600;
  margin-bottom: 15px;
}

.overlay p {
  font-size: 16px;
  font-weight: 300;
  line-height: 1.6;
}

/* RIGHT SIDE */
.right {
  flex: 1;
  padding: 50px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.right h2 {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 25px;
  text-align: center;
}

form {
  display: flex;
  flex-direction: column;
}

form input[type="text"],
form input[type="email"],
form input[type="password"] {
  height: 45px;
  padding: 0 15px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
  transition: 0.3s ease;
}

form input:focus {
  outline: none;
  border-color: #000;
}

.terms {
  display: flex;
  align-items: center;
  font-size: 12px;
  margin-bottom: 20px;
  gap: 8px;
}

.primary-btn {
  height: 45px;
  border: none;
  border-radius: 8px;
  background: #000;
  color: #fff;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s ease;
}

.primary-btn:hover {
  background: #333;
}

.divider {
  height: 1px;
  background: #eee;
  margin: 20px 0;
}

.google-btn,
.apple-btn {
  height: 45px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 12px;
  transition: 0.3s ease;
}

.google-btn img,
.apple-btn img {
  width: 18px;
}

.google-btn:hover,
.apple-btn:hover {
  background: #f5f5f5;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .card {
    flex-direction: column;
    height: auto;
  }

  .left {
    height: 250px;
  }

  .right {
    padding: 30px;
  }
}
</style>
<body>
<header class="header">
    <div class="logo">MONTI shop</div>
    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>
    <div class="header-nav">
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html"><img src="https://cdn-icons-png.flaticon.com/128/18996/18996272.png" alt="cart"></a>
      <a href="#"><img src="https://cdn-icons-png.flaticon.com/128/19026/19026023.png" alt="search"></a>
    </nav>
    </div>
  </header>

  <main>
  <div class="container">
    <div class="card">

      <!-- Left Side -->
      <div class="left">
        <div class="overlay">
          <h1>Create your Account</h1>
          <p>Share your artwork<br>and Get projects!</p>
        </div>
      </div>

      <!-- Right Side -->
      <div class="right">
        <h2>Sign Up</h2>

        <form>
          <input type="text" placeholder="First name" />
          <input type="text" placeholder="Last name" />
          <input type="email" placeholder="Email address" />
          <input type="password" placeholder="Password" />

          <div class="terms">
            <input type="checkbox" id="terms">
            <label for="terms">Accept Terms & Conditions</label>
          </div>

          <button class="primary-btn">Join us →</button>

          <div class="divider"></div>

          <button type="button" class="google-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="">
            Sign up with Google
          </button>

          <button type="button" class="apple-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="">
            Sign up with Apple
          </button>
        </form>
      </div>

    </div>
  </div>
  </main>
</body>
</html>
